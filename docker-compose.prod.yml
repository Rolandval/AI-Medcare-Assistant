services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medcare_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medcare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: medcare_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: medcare_backend
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  celery_worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: medcare_celery
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    command: celery -A app.celery_app worker --loglevel=info -Q default,ai_tasks --concurrency=4
    networks:
      - internal

  celery_beat:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: medcare_celery_beat
    restart: always
    env_file:
      - .env.prod
    depends_on:
      - redis
    command: celery -A app.celery_app beat --loglevel=info
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: medcare_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment when SSL is configured:
      # - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_logs:
